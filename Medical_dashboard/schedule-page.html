<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule</title>
    <link rel="stylesheet" href="css/all.min.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/schedule.css" />
  </head>
  <body>
    <header></header>
    <div class="container">
      <aside class="sidebar"></aside>
      <main class="main-content">
        <div class="main-inner">
          <h1 class="page-title">Schedule</h1>
          <div class="schedule-header">
            <div class="doctor-info">
              <div class="doctor-avatar-large">JN</div>
              <div class="doctor-details">
                <h2>Dr. Jenny Nackol</h2>
                <p>Cardiologist</p>
              </div>
            </div>
            <div class="schedule-controls">
              <div class="date-selector">
                <div class="date-dropdown">
                  <span>17 February 2021</span>
                  <i class="fas fa-chevron-down"></i>
                </div>
                <button class="nav-arrow">
                  <i class="fas fa-chevron-left"></i>
                </button>
                <button class="nav-arrow">
                  <i class="fas fa-chevron-right"></i>
                </button>
              </div>
              <button class="view-mode">
                Day
                <i class="fas fa-chevron-down"></i>
              </button>
            </div>
          </div>
          <div class="today-info">
            <span class="today-label">Today:</span>
            <span class="today-date" id="todayDate">14 February 2021</span>
            <button class="menu-dots" style="margin-left: auto">
              <i class="fas fa-ellipsis-v"></i>
            </button>
          </div>
          <div id="calendar"></div>
          <div class="app-btn">
            <a href="./appointments.html" class="appointments-back"
              >Back to appointments page</a
            >
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script type="module" src="./js/schedule.js"></script>
    <script src="./js/navbar.js"></script>
    <script src="./js/sidebar.js"></script>
  </body>
</html>
